name: Extract Info

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  extract_info:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.12.1

    - name: Install dependencies
      run: pip install beautifulsoup4

    - name: Check for changes
      id: check_changes
      run: echo "::set-output name=changes::$(git diff --name-only)"

    - name: Write info json to Repo
      run: |
        python .github/scripts/extract_info.py > info.json
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add info.json
        git commit -m "Info updated with Github Action"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.YOUR_PERSONAL_ACCESS_TOKEN }}

    - name: Write sitemap xml to Repo
      run: |
        python .github/scripts/generate_sitemap.py > sitemap.xml
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sitemap.xml
        git commit -m "Sitemap updated with Github Action"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.YOUR_PERSONAL_ACCESS_TOKEN }}
            
