ale names were 10 times more likely to end with a vowel. Other factors, such as ethnicity, the amount of syllables in the name, the length of the name, and whether the name started with a vowel had statistically significant but small correlation with sex."name=description><meta content=https://archive.gd.edu.kg/assets/bg.jpg itemprop=image><meta content=https://archive.gd.edu.kg/20240914190729/ property=og:url><meta content=website property=og:type><meta content="GitData Archive - NYC Newborn Analysis 2011-2019"property=og:title><meta content="The population of baby names has names come and go, and some have evolved. We wanted to see if we could predict sex based on ethnicity and name characteristics to see how these influences shift a name’s sex. The dataset we used was publicly available data from the city of New York containing the top 75 most popular names for each sex and ethnic category for each year from 2011-2019. Through our analysis on the dataset in regard to sex, we saw that there was a high correlation between name endings with a vowel and sex, where female names were 10 times more likely to end with a vowel. Other factors, such as ethnicity, the amount of syllables in the name, the length of the name, and whether the name started with a vowel had statistically significant but small correlation with sex."property=og:description><meta content=https://archive.gd.edu.kg/assets/bg.jpg property=og:image><meta content=summary_large_image name=twitter:card><meta content="GitData Archive - NYC Newborn Analysis 2011-2019"name=twitter:title><meta content="The population of baby names has names come and go, and some have evolved. We wanted to see if we could predict sex based on ethnicity and name characteristics to see how these influences shift a name’s sex. The dataset we used was publicly available data from the city of New York containing the top 75 most popular names for each sex and ethnic category for each year from 2011-2019. Through our analysis on the d
