<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check for Update</title>
</head>
<body>
    <h1>Check for Document Update</h1>
    <div id="update-message"></div>
    <div id="versions-list"></div>
    <div id="latest-authors"></div>

    <script>
        // Function to get query parameters
        function getQueryParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                preprintID: urlParams.get('preprintID'),
                version: urlParams.get('version')
            };
        }

        // Function to fetch JSON data
        async function fetchJSONData() {
            const response = await fetch('https://archive.gd.edu.kg/info.json');
            return await response.json();
        }

        // Function to extract preprintID from a given URL
        function extractPreprintID(url) {
            // Use regex to extract the numeric ID at the beginning of the URL
            const match = url.match(/https:\/\/archive\.gd\.edu\.kg\/(\d+)/);
            return match ? match[1] : null;
        }

        // Function to extract preprintID from a given URL
        function extractVersion(Json) {
            // Use regex to extract the numeric ID at the beginning of the URL
            const match = Json.match(/https:\/\/archive\.gd\.edu\.kg\/(\d+)/);
            return match ? match[1] : null;
        }

        // Function to check and display version info
        async function checkForUpdate() {
            const { preprintID, version } = getQueryParams();
            const data = await fetchJSONData();
            
            // Filter entries matching the preprintID from the URL
            const matchedPreprints = data.filter(item => extractPreprintID(item.url) === preprintID);
            const matchingVersion = matchedPreprints.find(item => item.version === version);
            
            // Sort versions by publication date in descending order (latest first)
            matchedPreprints.sort((a, b) => new Date(b.publication_date) - new Date(a.publication_date));

            if (matchedPreprints.length === 0 || !matchingVersion) {
                document.getElementById('update-message').textContent = 'No document found. Please double-check your query.';
                return;
            }

            const latestVersion = matchedPreprints[0];
            const isLatest = latestVersion.version === version;
            const updateMessage = isLatest 
                ? 'You are viewing the latest version of the document.' 
                : `You are viewing ${version.toLowerCase()} of the document, which is not the latest version.`;

            // Display the update message
            document.getElementById('update-message').textContent = updateMessage;

            // Display list of all versions from latest to oldest
            const versionsList = document.getElementById('versions-list');
            versionsList.innerHTML = '<p>For more details, see the versions below:</p><ul>' +
                matchedPreprints.map(v => `<li><a href="${v.url}">${v.version} - ${v.publication_date}</a></li>`).join('') +
                '</ul>';

            // Display authors of the latest version
            const latestAuthors = document.getElementById('latest-authors');
            latestAuthors.innerHTML = `<p>Authors of the latest version:</p><p>${latestVersion.authors.join(', ')}</p>`;
        }

        // Run the check on page load
        checkForUpdate();
    </script>
</body>
</html>
