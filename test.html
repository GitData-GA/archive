<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch and Show HTML</title>
    <script src="https://archive.gd.edu.kg/assets/jquery.min.js" type="text/javascript"></script>
</head>
<body>

<!-- Create a div with an id to display the fetched HTML -->
<div id="crawledHTML"></div>

<script>
  $(document).ready(function() {
    var fetchedHtml; // Declare a variable to store the fetched HTML

    $.get('https://archive.gd.edu.kg/20231224043044/', function(html) {
        fetchedHtml = html;

        // Write out the HTML to a specific div with id "crawledHTML"
        document.getElementById('crawledHTML').innerHTML = fetchedHtml;
    });
  });
</script>

</body>
</html>
