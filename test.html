<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch and Display HTML</title>
    <script src="https://archive.gd.edu.kg/assets/jquery.min.js" type="text/javascript"></script>
</head>
<body>

<script>
  $(document).ready(function() {
    $.get('https://archive.gd.edu.kg/20231224043044/', function(html) {
      // Instead of alert, write out the HTML to the body of the current document
      $('body').html(html);
    });
  });
</script>

</body>
</html>
