<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch and Log HTML</title>
    <script src="https://archive.gd.edu.kg/assets/jquery.min.js" type="text/javascript"></script>
</head>
<body>

<script>
  $(document).ready(function() {
    var fetchedHtml; // Declare a variable to store the fetched HTML

    $.get('https://archive.gd.edu.kg/20231224043044/', function(html) {
      // Save the HTML content in the variable
      fetchedHtml = html;

      // Log the HTML content to the console
      console.log(fetchedHtml);

      // If you want to display it on the page as well, you can use:
      // $('#fetchedHtmlContainer').html(html);
    });
  });
</script>

</body>
</html>
