            <div class="grid article-page d-flex">
                <div class="article-content col main-block">

                        <b><h1 style="font-family: Afacad; font-size: 50px">GitData <span style="color: #1b86b9;">arXiv</span></h1></b>
                        <p style="font-family: Afacad; font-size: 20px">Unlocking the World of Data Science, Statistics, and Computer Science: Explore GitData arXiv, Your Gateway to Unreviewed Scholarly Insights and Research Archives!</p>

            <div class="footer">

                    Unlock Data Potential
                </div>
                <div class="col-5 np">
                    &copy; <script type="text/JavaScript"> document.write(new Date().getFullYear()) </script> GitData arXiv
                </div>
                <script>
                  $(document).ready(function() {
                    $.ajax({
                      url: 'https://arxiv.gd.edu.kg/info.json',
                      type: 'GET',
                      dataType: 'json',
                      success: function(jsonData) {
                        // Function to truncate the abstract to the first 35 words
                        function truncateAbstract(abstract) {
                          var words = abstract.split(' ');
                          if (words.length > 35) {
                            return words.slice(0, 35).join(' ') + '...';
                          }
                          return abstract;
                        }
                        var htmlContainer = $('<div class="article-info col side-block"></div>');
                        htmlContainer.append('<div class="block-head"><h2>Recent Preprints</h2></div>');
                        for (var i = 0; i < Math.min(5, jsonData.length); i++) {
                          var paper = jsonData[i];
                          var title = paper.title;
                          var url = paper.url;
                          var subject = paper.subject;
                          var abstract = truncateAbstract(paper.abstract);
                
                          // Generate HTML code
                          var htmlCode = `
                            <div class="side-block_section">
                              <a href="${url}"><span class="head">${title}</span></a>
                              <p>${subject}</p>
                              <p>${abstract}</p>
                            </div>
                          `;
                          htmlContainer.append(htmlCode);
                        }
                        $('body').append(htmlContainer);
                      },
                      error: function(xhr, status, error) {
                        console.error('Error fetching JSON:', status, error);
                      }
                    });
                  });
                </script>
            </div>
        </div>
